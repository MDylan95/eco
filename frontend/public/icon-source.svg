<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a201c"/>
      <stop offset="100%" stop-color="#0a0d0b"/>
    </linearGradient>
    <linearGradient id="lime" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4f55e"/>
      <stop offset="100%" stop-color="#9bc232"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8f04a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c8f04a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Soft glow -->
  <ellipse cx="256" cy="256" rx="220" ry="200" fill="url(#glow)"/>

  <!-- Crescent moon (Lucide-style path scaled to fit) -->
  <g transform="translate(96, 96) scale(13.33)">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
          fill="url(#lime)"
          stroke="#9bc232"
          stroke-width="0.3"
          stroke-linejoin="round" />
  </g>

  <!-- Decorative stars -->
  <circle cx="125" cy="155" r="5" fill="#c8f04a" opacity="0.85"/>
  <circle cx="100" cy="220" r="3" fill="#c8f04a" opacity="0.5"/>
  <circle cx="160" cy="115" r="3" fill="#c8f04a" opacity="0.6"/>
</svg>
