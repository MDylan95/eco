<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a201c"/>
      <stop offset="100%" stop-color="#0a0d0b"/>
    </linearGradient>
    <linearGradient id="lime" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4f55e"/>
      <stop offset="100%" stop-color="#9bc232"/>
    </linearGradient>
  </defs>

  <!-- Full bleed background (no rounded corners — OS will mask) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Moon centered, sized for maskable safe zone (~50% of canvas) -->
  <g transform="translate(160, 160) scale(8.83)">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"
          fill="url(#lime)"
          stroke="#9bc232"
          stroke-width="0.4"
          stroke-linejoin="round" />
  </g>
</svg>
